name: Lint JavaScript

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        # Lệnh này chỉ chạy lint trên các file .js, .jsx, .mjs, .cjs
        run: npm run test -- --ext .js,.jsx,.mjs,.cjs .
